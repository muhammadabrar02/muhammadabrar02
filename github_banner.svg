<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#3E8EDE" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3E8EDE" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="photoClip">
      <circle cx="960" cy="200" r="118"/>
    </clipPath>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1E56A0" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- White base background -->
  <rect x="0" y="0" width="1200" height="400" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1200" height="400" fill="url(#dots)"/>

  <!-- Glow behind photo -->
  <circle cx="960" cy="200" r="190" fill="url(#glow)"/>

  <!-- Thin accent line -->
  <line x1="70" y1="205" x2="230" y2="205" stroke="#1E56A0" stroke-width="3"/>

  <!-- Name and title -->
  <text x="70" y="175" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#0A1B3D" letter-spacing="0.5">MUHAMMAD ABRAR</text>
  <text x="70" y="235" font-family="Arial, sans-serif" font-size="19" fill="#1E56A0" letter-spacing="1.5">SOFTWARE ENGINEER &#183; FULL STACK DEVELOPER</text>

  <!-- Tagline -->
  <text x="70" y="270" font-family="Arial, sans-serif" font-size="15" fill="#3A5680">Building scalable, user-focused web applications.</text>

  <!-- Contact info -->
  <text x="70" y="325" font-family="Arial, sans-serif" font-size="15" fill="#122B5C">abrarsolangi2002@gmail.com &#160;&#160;&#183;&#160;&#160; Karachi, Pakistan</text>

  <!-- Photo -->
  <circle cx="960" cy="200" r="124" fill="#DDE9F7"/>
  <circle cx="960" cy="200" r="118" fill="#EAF2FB"/>
  <g clip-path="url(#photoClip)">
    <image href="data:image/jpeg;base64," x="842" y="82" width="236" height="236" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <circle cx="960" cy="200" r="118" fill="none" stroke="#1E56A0" stroke-width="4"/>
</svg>
