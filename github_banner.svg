<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1B3D"/>
      <stop offset="100%" stop-color="#122B5C"/>
    </linearGradient>
    <linearGradient id="ribbon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E56A0"/>
      <stop offset="100%" stop-color="#3E8EDE"/>
    </linearGradient>
    <clipPath id="photoClip">
      <circle cx="600" cy="200" r="110"/>
    </clipPath>
  </defs>

  <!-- Right white background -->
  <rect x="0" y="0" width="1200" height="400" fill="#FFFFFF"/>

  <!-- Left navy panel -->
  <rect x="0" y="0" width="660" height="400" fill="url(#navy)"/>

  <!-- Diagonal ribbons on right side -->
  <polygon points="700,0 800,0 620,400 520,400" fill="url(#ribbon1)"/>
  <polygon points="850,0 910,0 780,400 720,400" fill="#3E8EDE" opacity="0.85"/>
  <polygon points="960,0 1000,0 900,400 860,400" fill="#A7C7E7" opacity="0.6"/>

  <!-- Photo placeholder circle -->
  <circle cx="600" cy="200" r="118" fill="#0A1B3D"/>
  <circle cx="600" cy="200" r="112" fill="#DDE9F7"/>
  <g clip-path="url(#photoClip)">
    <rect x="490" y="90" width="220" height="220" fill="#DDE9F7"/>
    <circle cx="600" cy="170" r="45" fill="#B9CFE8"/>
    <path d="M520 320 Q600 240 680 320 L680 320 L520 320 Z" fill="#B9CFE8"/>
    <text x="600" y="205" font-family="Arial, sans-serif" font-size="16" fill="#7C93B5" text-anchor="middle">your photo</text>
  </g>
  <circle cx="600" cy="200" r="112" fill="none" stroke="#3E8EDE" stroke-width="4"/>

  <!-- Name and title -->
  <text x="60" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="bold" fill="#FFFFFF" letter-spacing="0.5">MUHAMMAD ABRAR</text>
  <text x="60" y="172" font-family="Arial, sans-serif" font-size="15" fill="#8FB6E8" letter-spacing="0.5">SOFTWARE ENGINEER / FULL STACK DEVELOPER</text>

  <line x1="60" y1="195" x2="300" y2="195" stroke="#3E8EDE" stroke-width="2"/>

  <!-- Social icons row -->
  <g transform="translate(60,235)">
    <!-- LinkedIn -->
    <circle cx="16" cy="16" r="16" fill="#132F63"/>
    <text x="16" y="21" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8FB6E8" text-anchor="middle">in</text>

    <!-- GitHub -->
    <circle cx="60" cy="16" r="16" fill="#132F63"/>
    <text x="60" y="21" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8FB6E8" text-anchor="middle">GH</text>

    <!-- Behance -->
    <circle cx="104" cy="16" r="16" fill="#132F63"/>
    <text x="104" y="21" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8FB6E8" text-anchor="middle">Be</text>

    <!-- Email -->
    <circle cx="148" cy="16" r="16" fill="#132F63"/>
    <text x="148" y="21" font-family="Arial, sans-serif" font-size="14" fill="#8FB6E8" text-anchor="middle">@</text>
  </g>

  <!-- Contact info bottom left -->
  <g transform="translate(60,300)">
    <circle cx="8" cy="0" r="9" fill="#132F63"/>
    <text x="8" y="4" font-family="Arial, sans-serif" font-size="10" fill="#8FB6E8" text-anchor="middle">@</text>
    <text x="26" y="4" font-family="Arial, sans-serif" font-size="15" fill="#E6EEF9">abrarsolangi2002@gmail.com</text>
  </g>
  <g transform="translate(60,330)">
    <circle cx="8" cy="0" r="9" fill="#132F63"/>
    <text x="8" y="4" font-family="Arial, sans-serif" font-size="10" fill="#8FB6E8" text-anchor="middle">•</text>
    <text x="26" y="4" font-family="Arial, sans-serif" font-size="15" fill="#E6EEF9">Karachi, Pakistan</text>
  </g>

  <!-- Top right contact (LinkedIn handle) -->
  <text x="1140" y="45" font-family="Arial, sans-serif" font-size="15" fill="#0A1B3D" text-anchor="end">linkedin.com/in/muhammadabrar009</text>
  <text x="1140" y="70" font-family="Arial, sans-serif" font-size="15" fill="#0A1B3D" text-anchor="end">github.com/muhammadabrar02</text>
</svg>
